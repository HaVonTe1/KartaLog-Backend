events {
    worker_connections 1024;
}

http {
    upstream app {
        server kong:8000;
    }

    limit_req_zone $binary_remote_addr zone=external_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=external_conn:10m;

    map $remote_addr $is_local {
        default 0;
        ~^192\.168\. 1;
        ~^10\. 1;
        ~^172\.(1[6-9]|2[0-9]|3[0-1])\. 1;
    }

    server {
        listen 80;

        client_max_body_size 1M;
        client_body_buffer_size 128k;

        server_tokens off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        if ($request_uri ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$) {
            set $is_local 1;
        }

        location / {
            if ($args ~* (.+){126,}) {
                return 414;
            }
            if ($request_uri ~* ^/[^?]+[^a-zA-Z0-9\-\._~%/]{126,}) {
                return 414;
            }

            limit_req zone=external_limit burst=20 nodelay if=$is_local;
            limit_conn external_conn 20 if=$is_local;

            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /actuator/health {
            proxy_pass http://app;
            proxy_set_header Host $host;
        }
    }
}

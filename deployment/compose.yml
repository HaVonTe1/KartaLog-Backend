name: KartaLog Backend

services:
  nginx:
    profiles:
      - deployment
    image: nginx:alpine
    ports:
      - "19123:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    profiles:
      - deployment
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8080"
      - "8081"
    environment:
      - SPRING_PROFILES_ACTIVE=compose
      - PUPPETEER_WORKER_URL=http://scraper-worker:3000
      - PLAYWRIGHT_EXTRA_WORKER_URL=http://scraper-worker-playwright:3001
      - CHROME_CDP_URL=http://172.17.0.1:9223
      - CAMOUFOX_CDP_URL=ws://172.17.0.1:9225
      - CAMOUFOX_CDP_HEALTH_URL=http://172.17.0.1:9224
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - playwright-data:/app/playwright-data
    depends_on:
      postgres:
        condition: service_healthy
      scraper-worker:
        condition: service_started
    env_file:
      - ../.env

  admin-server:
    profiles:
      - deployment
    build:
      context: ..
      dockerfile: admin-server/Dockerfile
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    profiles:
      - deployment
      - local
    image: postgres:18.1
    ports:
      - "51915:5432"
    environment:
      - POSTGRES_DB=kartalogdb
    volumes:
      - ./postgres/initdb.d:/docker-entrypoint-initdb.d/
      - ./backups:/backups
      - ./scripts:/scripts:ro
      - postgres-data:/var/lib/postgresql
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kartalogdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.db-backup.schedule: "@every 1d"
      ofelia.job-exec.db-backup.command: "/scripts/backup.sh >> /backups/backup.log 2>&1"

  scraper-worker:
    profiles:
      - deployment
    build:
      context: ../scraper-worker
      dockerfile: Dockerfile
    ports:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  scraper-worker-playwright:
    profiles:
      - deployment
    build:
      context: ../scraper-worker-playwright
      dockerfile: Dockerfile
    ports:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  scraper-worker-python:
    profiles:
      - deployment
    build:
      context: ../scraper-worker-python
      dockerfile: Dockerfile
    ports:
      - "3002"
    environment:
      - PORT=3002
      - HEADLESS=true
      - NAV_TIMEOUT=90000
      # Path to a cookies.json file (Playwright format) inside the container.
      # Mount a host file at this path to reuse your Chrome browser's
      # cf_clearance cookie and skip Cloudflare challenges.
      - COOKIES_FILE=/app/cookies.json
    volumes:
      # Mount cookies.json from host. Create it by exporting cookies from
      # Chrome DevTools → Application → Cookies → cardmarket.com → "Export as JSON"
      # and saving to ./cookies.json relative to the compose file.
      - ./cookies.json:/app/cookies.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ofelia:
    profiles:
      - deployment
    image: mcuadros/ofelia:latest
    depends_on:
      - postgres
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  playwright-data:
  postgres-data:

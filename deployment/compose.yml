name: TCGWatcher Backend

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8091:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tcgwatcherdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - SPRING_DOCKER_COMPOSE_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env

  postgres:
    image: postgres:18.1
    ports:
      - "51915:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=tcgwatcherdb
    volumes:
      - ./postgres/initdb.d:/docker-entrypoint-initdb.d/
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tcgwatcherdb"]
      interval: 5s
      timeout: 5s
      retries: 5

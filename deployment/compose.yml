name: TCGWatcher Backend

services:
  nginx:
    profiles:
      - deployment
    image: nginx:alpine
    ports:
      - "19123:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      kong:
        condition: service_healthy

  kong:
    profiles:
      - deployment
    build:
      context: ./kong
      dockerfile: Dockerfile
    image: tcgwatcher-kong:latest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PLUGINS: "bundled,oasvalidator"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000"
    volumes:
      - ./kong/kong.yml:/opt/kong/kong.yml:ro
      - /home/havonte/dev/TCGWatcher-Backend/contract/openapi.yaml:/openapi/openapi.yaml:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    profiles:
      - deployment
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=compose
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env

  postgres:
    profiles:
      - deployment
      - local
    image: postgres:18.1
    ports:
      - "51915:5432"
    environment:
      - POSTGRES_DB=tcgwatcherdb
    volumes:
      - ./postgres/initdb.d:/docker-entrypoint-initdb.d/
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tcgwatcherdb"]
      interval: 5s
      timeout: 5s
      retries: 5

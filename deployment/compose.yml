name: TCGWatcher Backend

services:
  nginx:
    profiles:
      - deployment
    image: nginx:alpine
    ports:
      - "19123:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    profiles:
      - deployment
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=compose
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env

  postgres:
    profiles:
      - deployment
      - local
    image: postgres:18.1
    ports:
      - "51915:5432"
    environment:
      - POSTGRES_DB=tcgwatcherdb
    volumes:
      - ./postgres/initdb.d:/docker-entrypoint-initdb.d/
      - ./backups:/backups
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tcgwatcherdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup:
    profiles:
      - backup
    image: postgres:18.1
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    env_file:
      - ../.env
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "0 2 * * * /scripts/backup.sh >> /backups/backup.log 2>&1" > /etc/crontabs/root
        crond -f

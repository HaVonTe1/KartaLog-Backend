openapi: 3.0.3
info:
  title: TCGWatcher API
  version: 0.1.0
  description: |
    Minimal OpenAPI contract for the TCGWatcher backend.
    This file will be expanded with the full use‑case APIs.
  contact:
    url: https://github.com/HaVonTe1
  license:
    name: Creative Commons
    url: https://creativecommons.org/licenses/
servers:
  - url: https://havonte.ddns.net:8080
    description: Production server
paths:
  /collectables/:
    get:
      summary: List / search collectables
      tags:
        - collectables
      description: |
        Placeholder endpoint that will later support search parameters.
        Currently it provides pagination support and returns an array of collectables.
      operationId: listCollectables
      parameters:
        - name: page
          in: query
          description: Page number (starting at 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: query
          in: query
          description: Search query for collectable products
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 255
            example: "Pikachu"
        - name: locale
          in: query
          description: Locale for CardMarket (e.g., de, en)
          required: false
          schema:
            type: string
            default: de
        - name: game
          in: query
          description: Game for CardMarket (e.g., Pokemon)
          required: false
          schema:
            type: string
            default: Pokemon
      responses:
        '200':
          description: Successful response – a list of collectables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
  /collectables/{cmId}:
    get:
      summary: Get product details by ID
      tags:
        - collectables
      description: |
        Fetch detailed information for a specific product including sell offers.
        The product data is updated from CardMarket on each request and persisted if changes are detected.
      operationId: getProductDetails
      parameters:
        - name: cmId
          in: path
          required: true
          schema:
            type: string
            example: "CM001"
        - name: genre
          in: query
          required: false
          schema:
            type: string
            default: pokemon
        - name: type
          in: query
          required: false
          schema:
            type: string
            default: singles
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: de
        - name: setname
          in: query
          required: true
          schema:
            type: string
            example: "setx"
      responses:
        '200':
          description: Successful response – product details with all available information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailsDTO'
        '404':
          description: Product not found on CardMarket
components:
  schemas:
    ProductDTO:
      type: object
      description: Data Transfer Object representing a product/collectable
      properties:
        id:
          type: string
        externalId:
          type: integer
          format: int64
        setName:
          type: string
          nullable: true
        genre:
          type: string
        type:
          type: string
        rarity:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true

    ProductDetailsDTO:
      type: object
      description: Detailed product information including sell offers
      properties:
        id:
          type: string
        externalId:
          type: integer
          format: int64
        setName:
          type: string
          nullable: true
        genre:
          type: string
        type:
          type: string
        rarity:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        detailsUrl:
          type: string
          format: uri
        price:
          type: string
        priceTrend:
          type: string
        sellOffers:
          type: array
          items:
            $ref: '#/components/schemas/SellOfferDTO'

    SellOfferDTO:
      type: object
      description: Individual sell offer for a product
      properties:
        sellerName:
          type: string
        sellerLocation:
          type: string
        productLanguage:
          type: string
        special:
          type: string
        condition:
          type: string
        amount:
          type: string
        price:
          type: string


server:
  port: 8080
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,heapdump,threaddump
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
spring:
  boot:
    admin:
      client:
        url: http://admin-server:8080
        instance:
          name: KartaLog-Backend
          management-url: http://app:8081/actuator
          health-url: http://app:8081/actuator/health
          service-base-url: http://app:8080
          auto-registration: true
          auto-deregistration: true
        metadata:
          context-path: /actuator
  datasource:
    url: jdbc:postgresql://postgres:5432/kartalogdb
    username: watcher_app
    password: ${WATCHER_APP_PWD}
  liquibase:
    enabled: true
    default-schema: watcher
    password: ${WATCHER_MIG_PWD}
    user: watcher_mig
  docker:
    compose:
      enabled: false
scraper:
  worker:
    url: ${SCRAPER_WORKER_URL:}

playwright:
  browser: chromium
  # Switch to camoufox for Camoufox stealth scraping:
  # browser: camoufox
  # executable-path: /opt/camoufox/camoufox-bin
  user-data-dir: /app/playwright-data

app:
  data:
    import:
      enabled: false

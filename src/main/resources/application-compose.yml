server:
  port: 8080
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,heapdump,threaddump
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
spring:
  mvc:
    async:
      request-timeout: 120000
  boot:
    admin:
      client:
        url: http://admin-server:8080
        instance:
          name: KartaLog-Backend
          management-url: http://app:8081/actuator
          health-url: http://app:8081/actuator/health
          service-base-url: http://app:8080
          auto-registration: true
          auto-deregistration: true
        metadata:
          context-path: /actuator
  datasource:
    url: jdbc:postgresql://postgres:5432/kartalogdb
    username: watcher_app
    password: ${WATCHER_APP_PWD}
  liquibase:
    enabled: true
    default-schema: watcher
    password: ${WATCHER_MIG_PWD}
    user: watcher_mig
  docker:
    compose:
      enabled: false
scraper:
  default-strategy: camoufox-python-worker
  workers:
    puppeteer:
      url: ${PUPPETEER_WORKER_URL:http://scraper-worker:3000}
    playwright-extra:
      url: ${PLAYWRIGHT_EXTRA_WORKER_URL:}
    camoufox-python:
      url: ${CAMOUFOX_PYTHON_WORKER_URL:http://scraper-worker-python:3002}

playwright:
  chromium:
    executable-path: ${PLAYWRIGHT_CHROMIUM_PATH:}
  camoufox:
    executable-path: ${PLAYWRIGHT_CAMOUFOX_PATH:/opt/camoufox/camoufox-bin}
  user-data-dir: /app/playwright-data

app:
  data:
    import:
      enabled: false

spring:
  application:
    name: TCGWatcher-Backend
  docker:
    compose:
      enabled: true
      file: ${user.dir}/deployment/compose.yml
      lifecycle-management: start_only
      start:
        skip: if_running
  liquibase:
    parameters:
      watcher_readonly.password: ${WATCHER_READONLY_PWD}
      migration.password: ${MIGRATION_PWD}
      watcher_mig.password: ${WATCHER_MIG_PWD}
      watcher_app.password: ${WATCHER_APP_PWD}
      application.password: ${APPLICATION_PWD}
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_updates: true

resilience4j:
  circuitbreaker:
    instances:
      cardMarketCircuitBreaker:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 10s
        minimum-number-of-calls: 10
        sliding-window-size: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  retry:
    instances:
      cardMarketRetry:
        max-attempts: 3
        wait-duration: 1s
        wait-duration-multiplier: 2.0

logging:
  level:
    io.github.havonte1: trace
    org.springframework.web: trace
    web: trace
    com.github.tomakehurst: trace
    eu.rekawek: trace
